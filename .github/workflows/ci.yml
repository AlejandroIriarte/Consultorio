name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: consultorio
          POSTGRES_PASSWORD: consultorio_test
          POSTGRES_DB: consultorio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://consultorio:consultorio_test@localhost:5432/consultorio_test

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://consultorio:consultorio_test@localhost:5432/consultorio_test
          JWT_SECRET: test_secret_for_ci_only_32chars_min
          TOTP_ENCRYPTION_KEY: test_totp_key_for_ci_only
          NODE_ENV: test
